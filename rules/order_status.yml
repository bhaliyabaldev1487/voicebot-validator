version: 1.0

category: ORDER_STATUS

description: >
  Canonical order lifecycle rules for Voicebot Validator.
  These rules normalize various bot responses into canonical order statuses.

default_confidence: 0.90

statuses:

  UNKNOWN:

    enabled: true

    priority: 1

    confidence: 0.25

    stage: unknown

    aliases:
      - UNKNOWN
      - UNIDENTIFIED
      - NOT_FOUND

    phrases:
      - i am not sure
      - i don't know
      - unable to identify
      - unable to locate
      - unable to fetch
      - sorry i cannot find
      - i could not find
      - information unavailable
      - order information unavailable
      - status unavailable
      - no status available
      - cannot retrieve
      - system unavailable
      - service unavailable
      - please try again later
      - technical issue
      - backend error
      - internal error
      - unknown status
      - order not found

    regex:
      - "(unable|cannot) (find|locate)"
      - "status unavailable"
      - "order not found"

    negative: []

    db_values:
      - UNKNOWN
      - NULL

    expected_bot_entities:
      - order_status

    examples:
      - Sorry, I cannot retrieve your order details.
      - Order information is unavailable right now.

    metadata:
      customer_visible: true

